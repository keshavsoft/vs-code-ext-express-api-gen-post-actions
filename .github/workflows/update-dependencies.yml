name: Update Dependencies

on:
  workflow_dispatch: # Allows you to manually trigger this update from the Actions tab

# Ensure the workflow has permission to commit, push branches, and create pull requests
permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    name: Update Production Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies (Initial)
        run: npm ci

      - name: Update Normal Dependencies
        run: |
          node -e "
          const fs = require('fs');
          const execSync = require('child_process').execSync;

          try {
            // Read package.json
            const pkgJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const deps = Object.keys(pkgJson.dependencies || {});

            if (deps.length === 0) {
              console.log('No production dependencies found in package.json.');
              process.exit(0);
            }

            console.log('Updating production dependencies to latest:', deps.join(', '));
            
            // Construct the install command targeting only production dependencies
            const installTargets = deps.map(dep => dep + '@latest').join(' ');
            const installCmd = 'npm install ' + installTargets + ' --save';
            
            console.log('Running: ' + installCmd);
            execSync(installCmd, { stdio: 'inherit' });
            
            console.log('Successfully updated production dependencies!');
          } catch (error) {
            console.error('Failed to update dependencies:', error);
            process.exit(1);
          }
          "

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are any changes before creating PR
          if git diff-index --quiet HEAD --; then
            echo "No dependency updates found."
          else
            # Create a unique branch name with a timestamp
            BRANCH_NAME="update-deps-$(date +%s)"
            git checkout -b "$BRANCH_NAME"
            
            git add package.json package-lock.json
            git commit -m "chore: auto-update production dependencies to latest"
            
            # Push the branch to origin
            git push origin "$BRANCH_NAME"
            
            # Create Pull Request
            gh pr create \
              --title "chore: update production dependencies to latest" \
              --body "This PR was automatically created by the **Update Dependencies** workflow to update your production packages to their latest versions." \
              --head "$BRANCH_NAME" \
              --base main
          fi
