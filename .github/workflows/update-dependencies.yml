name: Update Dependencies

on:
  workflow_dispatch: # Allows you to manually trigger this update from the Actions tab
  repository_dispatch:
    types: [parent_package_updated]

# Ensure the workflow has permission to commit and push changes and create pull requests
permissions:
  contents: write
  pull-requests: write


jobs:
  update-deps:
    name: Update Production Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies (Initial)
        run: npm ci

      - name: Update Normal Dependencies
        id: update_step
        env:
          PAYLOAD_PACKAGE: ${{ github.event.client_payload.package }}
          PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
        run: |
          node -e "
          const fs = require('fs');
          const execSync = require('child_process').execSync;

          try {
            const pkg = process.env.PAYLOAD_PACKAGE;
            const version = process.env.PAYLOAD_VERSION;
            let commitMsg = 'chore: auto-update production dependencies to latest';

            if (pkg && version) {
              console.log('Updating specific package: ' + pkg + '@' + version);
              const installCmd = 'npm install ' + pkg + '@' + version + ' --save';
              
              let success = false;
              for (let attempt = 1; attempt <= 6; attempt++) {
                try {
                  console.log('Attempt ' + attempt + ' to install ' + pkg + '@' + version);
                  execSync(installCmd, { stdio: 'inherit' });
                  success = true;
                  break;
                } catch (installError) {
                  if (attempt === 6) {
                    throw new Error('Failed to install ' + pkg + '@' + version + ' after 6 attempts: ' + installError.message);
                  }
                  console.log('Installation attempt ' + attempt + ' failed (it may take a moment for the new version to propagate). Retrying in 15 seconds...');
                  // Synchronous sleep in Node.js
                  Atomics.wait(new Int32Array(new SharedArrayBuffer(4)), 0, 0, 15000);
                }
              }
              commitMsg = 'chore: update ' + pkg + ' to ' + version;
            } else {
              // Read package.json
              const pkgJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              const deps = Object.keys(pkgJson.dependencies || {});

              if (deps.length === 0) {
                console.log('No production dependencies found in package.json.');
                process.exit(0);
              }

              console.log('Updating production dependencies to latest:', deps.join(', '));
              
              // Construct the install command targeting only production dependencies
              const installTargets = deps.map(dep => dep + '@latest').join(' ');
              const installCmd = 'npm install ' + installTargets + ' --save';
              
              console.log('Running: ' + installCmd);
              execSync(installCmd, { stdio: 'inherit' });
            }
            
            console.log('Successfully updated dependencies!');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'commit_msg=' + commitMsg + '\n');
          } catch (error) {
            console.error('Failed to update dependencies:', error);
            process.exit(1);
          }
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "${{ steps.update_step.outputs.commit_msg }}" || exit 0
          git push origin HEAD:${{ github.ref_name }}


