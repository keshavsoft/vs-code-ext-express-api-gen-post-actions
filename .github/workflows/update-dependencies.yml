name: Update Dependencies

on:
  workflow_dispatch: # Allows you to manually trigger this update from the Actions tab

# Ensure the workflow has permission to commit and push changes back to the repository
permissions:
  contents: write

jobs:
  update-deps:
    name: Update Production Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies (Initial)
        run: npm ci

      - name: Update Normal Dependencies
        run: |
          node -e "
          const fs = require('fs');
          const execSync = require('child_process').execSync;

          try {
            // Read package.json
            const pkgJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const deps = Object.keys(pkgJson.dependencies || {});

            if (deps.length === 0) {
              console.log('No production dependencies found in package.json.');
              process.exit(0);
            }

            console.log('Updating production dependencies to latest:', deps.join(', '));
            
            // Construct the install command targeting only production dependencies
            const installTargets = deps.map(dep => dep + '@latest').join(' ');
            const installCmd = 'npm install ' + installTargets + ' --save';
            
            console.log('Running: ' + installCmd);
            execSync(installCmd, { stdio: 'inherit' });
            
            console.log('Successfully updated production dependencies!');
          } catch (error) {
            console.error('Failed to update dependencies:', error);
            process.exit(1);
          }
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          
          # Check if there are any changes before committing to avoid errors
          if git diff-index --quiet HEAD --; then
            echo "No dependency updates found to commit."
          else
            git commit -m "chore: auto-update production dependencies to latest"
            git push
          fi
